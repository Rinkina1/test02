<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แบบสอบถาม - กรอกชื่อ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>แบบสอบถาม</h1>
    <p class="subtitle">กรุณากรอกชื่อของคุณ</p>

    <div id="dbStatus" class="db-status">กำลังเชื่อมต่อ PostgreSQL...</div>

    <form id="nameForm" autocomplete="off">
      <label for="name">ชื่อ</label>
      <input
        id="name"
        name="name"
        type="text"
        placeholder="พิมพ์ชื่อของคุณที่นี่..."
        required
        maxlength="255"
        disabled
      />
      <button type="submit" disabled>ส่งข้อมูล</button>
    </form>

    <div id="message" class="message" hidden></div>

    <section class="list-section">
      <div class="list-header">
        <h2>ข้อมูลในตาราง responses <span id="count">(0)</span></h2>
        <div class="actions">
          <button id="refreshBtn" type="button" class="action-btn">รีเฟรช</button>
          <button id="exportCsvBtn" type="button" class="action-btn">ดาวน์โหลด .csv</button>
          <button id="clearBtn" type="button" class="clear-btn">ล้างทั้งหมด</button>
        </div>
      </div>
      <ul id="nameList"></ul>
    </section>

    <details class="schema-info">
      <summary>ดู Schema ของตาราง (PostgreSQL)</summary>
<pre><code>CREATE TABLE responses (
  id         SERIAL       PRIMARY KEY,
  name       VARCHAR(255) NOT NULL,
  created_at TIMESTAMPTZ  NOT NULL DEFAULT NOW()
);</code></pre>
    </details>
  </main>

  <script src="script.js"></script>
</body>
</html>
